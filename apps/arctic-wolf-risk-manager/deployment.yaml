apiVersion: apps/v1
kind: Deployment
metadata:
  name: arctic-wolf-risk-manager-app
  namespace: my-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arctic-wolf-risk-manager-app
  template:
    metadata:
      labels:
        app: arctic-wolf-risk-manager-app
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: arc
        image: arctic-wold-risk-manager:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: arctic-wolf-svc
  namespace: my-namespace
spec:
  selector:
    app: arctic-wolf-risk-manager-app
  ports:
  - port: 8080
    targetPort: 8080