# Gateway API resources for testing

# 1. GatewayClass
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: gloo-gateway
spec:
  controllerName: solo.io/gloo-gateway

# 2. Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: my-namespace
spec:
  gatewayClassName: gloo-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
    allowedRoutes:
      namespaces:
        from: All

# 3. HTTPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-route
  namespace: my-namespace
spec:
  parentRefs:
  - name: test-gateway
    namespace: my-namespace
  hostnames:
  - "test.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: test-app
      port: 8080

---
apiVersion: gateway.solo.io/v1
kind: RouteOption
metadata:
  name: add-headers
  namespace: my-namespace
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-route
  options:
    headerManipulation:
      requestHeadersToAdd:
      - header:
          key: x-custom-header
          value: my-value
      responseHeadersToAdd:
      - header:
          key: x-response-header
          value: added-by-gloo
