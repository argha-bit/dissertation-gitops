# Gateway API resources for testing
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-route
  namespace: my-namespace
spec:
  parentRefs:
  - name: test-gateway
    namespace: my-namespace
  hostnames:
  - "test.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: test-app
      port: 8080

---
apiVersion: gateway.solo.io/v1
kind: RouteOption
metadata:
  name: add-headers
  namespace: my-namespace
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-route
  options:
    headerManipulation:
      requestHeadersToAdd:
      - header:
          key: x-custom-header
          value: my-value
      responseHeadersToAdd:
      - header:
          key: x-response-header
          value: added-by-gloo
