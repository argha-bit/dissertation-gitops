apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argha-bit/dissertation-gitops.git
    path: gateway-config
    targetRevision: master
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: my-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true