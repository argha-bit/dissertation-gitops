apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: the-governor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argha-bit/dissertation-gitops.git
    path: helm/the-governor
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: my-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
