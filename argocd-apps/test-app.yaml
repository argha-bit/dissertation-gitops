apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argha-bit/dissertation-gitops.git
    path: apps/test-app
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: my-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true