apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      serviceAccountName: {{ .Values.name }}
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/code/the-governor"]
          args: ["--engine=OPERATOR"]
          env:
            - name: DEPLOYMENT_KIND
              value: {{ .Values.operator.deploymentKind }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
